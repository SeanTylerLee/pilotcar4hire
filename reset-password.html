<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#152238">
  <meta name="description" content="Set a new password for your Pilot Car 4 Hire account.">
  <title>Reset Password | Pilot Car 4 Hire</title>
  <link rel="stylesheet" href="css/styles.css?v=21">
  <link rel="icon" href="images/favicon.ico" sizes="any">
  <link rel="icon" href="images/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="images/favicon-16.png" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <header class="header">
    <a href="index.html" class="logo">
      <img src="images/logo.svg" alt="Pilot Car 4 Hire" class="logo-img">
    </a>
  </header>

  <main class="main page" id="main-content">
    <div class="page-inner">
      <div class="page-head">
        <p class="eyebrow">Account recovery</p>
        <h1 class="page-title">Set new password</h1>
        <p class="page-subtitle">Choose a new password for your pilot car account.</p>
      </div>

      <form class="auth-form panel" id="reset-form">
        <label class="field">
          <span class="field-label">New password</span>
          <input type="password" name="password" required autocomplete="new-password" minlength="6">
        </label>
        <label class="field">
          <span class="field-label">Confirm password</span>
          <input type="password" name="confirmPassword" required autocomplete="new-password" minlength="6">
        </label>
        <p class="form-message" id="reset-message" hidden></p>
        <button type="submit" class="btn-submit">Update password</button>
        <a href="login.html" class="text-link">Back to log in</a>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="images/logo.svg" alt="" class="footer-logo" width="160" height="36">
        <p class="footer-tagline">Escorts · Leads · Oversize Loads</p>
      </div>
      <nav class="footer-nav">
        <a href="index.html#map">Find pilot cars</a>
        <a href="pilot-cars.html">Browse by state</a>
        <a href="signup.html">List your service</a>
        <a href="account.html">Account</a>
      </nav>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 Pilot Car 4 Hire. All rights reserved. <a href="admin.html" class="footer-admin-link">Admin</a></p>
    </div>
  </footer>

  <script src="js/config.js?v=22"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8"></script>
  <script src="js/supabase-client.js?v=18"></script>
  <script src="js/storage.js?v=18"></script>
  <script src="js/auth.js?v=18"></script>
  <script src="js/menu.js?v=18"></script>
  <script src="js/reset-password.js?v=18"></script>
</body>
</html>
