<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In | Pilot Car 4 Hire</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="images/logo.svg" type="image/svg+xml">
</head>
<body>
  <header class="header">
    <a href="index.html" class="logo">
      <img src="images/logo.svg" alt="Pilot Car 4 Hire" class="logo-img">
    </a>
    <button class="menu-btn" type="button" aria-label="Open menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="nav-panel" hidden></nav>
  </header>

  <main class="main page">
    <div class="page-inner">
      <div class="page-head">
        <p class="eyebrow">Pilot car drivers</p>
        <h1 class="page-title">Log in</h1>
        <p class="page-subtitle">Access your listing and update your escort details.</p>
      </div>

      <form class="auth-form panel" id="login-form">
        <label class="field">
          <span class="field-label">Email</span>
          <input type="email" name="email" required autocomplete="email" placeholder="you@company.com">
        </label>
        <label class="field">
          <span class="field-label">Password</span>
          <input type="password" name="password" required autocomplete="current-password">
        </label>
        <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
        <p class="form-message" id="login-message" hidden></p>
        <button type="submit" class="btn-submit">Log in</button>
        <p class="auth-switch">New here? <a href="signup.html" class="text-link">Sign up free</a> — takes under two minutes.</p>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="images/logo.svg" alt="" class="footer-logo" width="160" height="36">
        <p class="footer-tagline">Escorts · Leads · Oversize Loads</p>
      </div>
      <nav class="footer-nav">
        <a href="index.html#map">Find pilot cars</a>
        <a href="signup.html">List your service</a>
        <a href="account.html">Account</a>
      </nav>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 Pilot Car 4 Hire. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
