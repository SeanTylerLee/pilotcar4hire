<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#152238">
  <meta name="description" content="Reset your Pilot Car 4 Hire account password.">
  <title>Forgot Password | Pilot Car 4 Hire</title>
  <link rel="stylesheet" href="css/styles.css?v=21">
  <link rel="icon" href="images/logo.svg" type="image/svg+xml">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <header class="header">
    <a href="index.html" class="logo">
      <img src="images/logo.svg" alt="Pilot Car 4 Hire" class="logo-img">
    </a>
  </header>

  <main class="main page" id="main-content">
    <div class="page-inner">
      <div class="page-head">
        <p class="eyebrow">Account recovery</p>
        <h1 class="page-title">Forgot password</h1>
        <p class="page-subtitle">Enter your email and we'll send reset instructions.</p>
      </div>

      <form class="auth-form panel" id="forgot-form">
        <label class="field">
          <span class="field-label">Email</span>
          <input type="email" name="email" required autocomplete="email" placeholder="you@company.com">
        </label>
        <p class="form-message" id="forgot-message" hidden></p>
        <button type="submit" class="btn-submit">Send reset link</button>
        <a href="login.html" class="text-link">Back to log in</a>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="images/logo.svg" alt="" class="footer-logo" width="160" height="36">
        <p class="footer-tagline">Escorts · Leads · Oversize Loads</p>
      </div>
      <nav class="footer-nav">
        <a href="index.html#map">Find pilot cars</a>
        <a href="pilot-cars.html">Browse by state</a>
        <a href="signup.html">List your service</a>
        <a href="account.html">Account</a>
      </nav>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 Pilot Car 4 Hire. All rights reserved. <a href="admin.html" class="footer-admin-link">Admin</a><span class="version-badge" id="site-version" hidden></span></p>
    </div>
  </footer>

  <script src="js/config.js?v=22"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8"></script>
  <script src="js/supabase-client.js?v=18"></script>
  <script src="js/storage.js?v=18"></script>
  <script src="js/auth.js?v=18"></script>
  <script src="js/menu.js?v=18"></script>
  <script src="js/forgot-password.js?v=18"></script>
</body>
</html>
