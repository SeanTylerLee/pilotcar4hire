<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Pilot Car 4 Hire</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="images/logo.svg" type="image/svg+xml">
</head>
<body>
  <header class="header">
    <a href="index.html" class="logo">
      <img src="images/logo.svg" alt="Pilot Car 4 Hire" class="logo-img">
    </a>
    <button class="menu-btn" type="button" aria-label="Open menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="nav-panel" hidden></nav>
  </header>

  <main class="main page">
    <div class="page-inner">
      <div class="page-head">
        <p class="eyebrow">Account recovery</p>
        <h1 class="page-title">Forgot password</h1>
        <p class="page-subtitle">Enter your email and we'll send reset instructions.</p>
      </div>

      <form class="auth-form panel" id="forgot-form">
        <label class="field">
          <span class="field-label">Email</span>
          <input type="email" name="email" required autocomplete="email" placeholder="you@company.com">
        </label>
        <p class="form-message" id="forgot-message" hidden></p>
        <button type="submit" class="btn-submit">Send reset link</button>
        <a href="index.html" class="text-link">Back to log in</a>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="images/logo.svg" alt="" class="footer-logo" width="160" height="36">
        <p class="footer-tagline">Escorts · Leads · Oversize Loads</p>
      </div>
      <nav class="footer-nav">
        <a href="browse.html">Find pilot cars</a>
        <a href="pilot-car.html">List your service</a>
        <a href="account.html">Account</a>
      </nav>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 Pilot Car 4 Hire. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/forgot-password.js"></script>
</body>
</html>
