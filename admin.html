<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#152238">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Log In | Pilot Car 4 Hire</title>
  <link rel="stylesheet" href="css/styles.css?v=48">
  <link rel="icon" href="images/logo.svg" type="image/svg+xml">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <header class="header">
    <a href="index.html" class="logo">
      <img src="images/logo.svg" alt="Pilot Car 4 Hire" class="logo-img">
    </a>
  </header>

  <main class="main page" id="main-content">
    <div class="page-inner">
      <div class="page-head">
        <p class="eyebrow">Site admin</p>
        <h1 class="page-title">Admin log in</h1>
        <p class="page-subtitle">Sign in with your authorized account to access the dashboard.</p>
      </div>

      <form class="auth-form panel" id="admin-login-form">
        <label class="field">
          <span class="field-label">Email</span>
          <input type="email" name="email" required autocomplete="email" placeholder="you@example.com">
        </label>
        <label class="field">
          <span class="field-label">Password</span>
          <input type="password" name="password" required autocomplete="current-password">
        </label>
        <p class="form-message" id="admin-login-message" hidden></p>
        <button type="submit" class="btn-submit">Log in</button>
        <p class="auth-switch"><a href="index.html" class="text-link">← Back to site</a></p>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom">
      <p>&copy; 2026 Pilot Car 4 Hire.</p>
    </div>
  </footer>

  <script src="js/config.js?v=48"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8"></script>
  <script src="js/supabase-client.js?v=48"></script>
  <script src="js/auth.js?v=48"></script>
  <script src="js/admin-login.js?v=48"></script>
</body>
</html>
