<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#152238">
  <meta name="description" content="Browse pilot car escorts in every U.S. state. Find lead, chase, hi-pole, and route survey services near your route.">
  <title>Pilot Cars by State | Pilot Car 4 Hire</title>
  <link rel="stylesheet" href="css/styles.css?v=21">
  <link rel="icon" href="images/logo.svg" type="image/svg+xml">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <header class="header">
    <a href="index.html" class="logo">
      <img src="images/logo.svg" alt="Pilot Car 4 Hire" class="logo-img">
    </a>
  </header>

  <main class="main page" id="main-content">
    <div class="page-inner page-inner-wide">
      <div class="page-head">
        <p class="eyebrow">Directory</p>
        <h1 class="page-title">Pilot cars by state</h1>
        <p class="page-subtitle">Choose a state to see escorts based there. Each listing includes contact info — no account needed to browse.</p>
      </div>

      <div class="state-directory-grid panel" id="state-directory" aria-label="U.S. states"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="images/logo.svg" alt="" class="footer-logo" width="160" height="36">
        <p class="footer-tagline">Escorts · Leads · Oversize Loads</p>
      </div>
      <nav class="footer-nav">
        <a href="index.html#map">Find pilot cars</a>
        <a href="pilot-cars.html">Browse by state</a>
        <a href="signup.html">List your service</a>
        <a href="account.html">Account</a>
      </nav>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 Pilot Car 4 Hire. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/config.js?v=18"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8"></script>
  <script src="js/supabase-client.js?v=18"></script>
  <script src="js/states.js?v=18"></script>
  <script src="js/storage.js?v=18"></script>
  <script src="js/auth.js?v=18"></script>
  <script src="js/menu.js?v=18"></script>
  <script>
    runWhenReady(async () => {
      initNav('pilot-cars');

      const grid = document.getElementById('state-directory');
      if (!grid) return;

      let listings = [];
      try {
        listings = await getAllListingsWithUsers();
      } catch (err) {
        console.error(err);
      }

      const counts = {};
      listings.forEach((listing) => {
        const code = normalizeListing(listing).homeState?.toUpperCase();
        if (code) counts[code] = (counts[code] || 0) + 1;
      });

      US_STATES.forEach((code) => {
        const link = document.createElement('a');
        link.className = 'state-directory-link';
        link.href = `state.html?state=${code}`;
        link.innerHTML = `
          <span class="state-directory-code">${code}</span>
          <span class="state-directory-name">${getStateName(code)}</span>
          ${counts[code] ? `<span class="state-directory-count">${counts[code]} listed</span>` : ''}
        `;
        grid.appendChild(link);
      });
    });
  </script>
</body>
</html>
